name: Aktualizace seznamu akcí

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"  # každý den v 5:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai requests

      - name: Generate index.html
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python <<EOF
          import os
          from openai import OpenAI

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])

          prompt = """
          Vytvoř kompletní responsivní HTML stránku s názvem:
          'Nadcházející vzdělávací akce s Václavem Maněnou'.

          Načti a vyhledej aktuální akce z:
          https://www.tchk.cz/vzdelavaci-akce
          https://www.kcv.cz/dvpp/katalog-vzdelavacich-programu/
          https://academyeducation.cz/pro_skoly/

          Seřaď podle nejbližšího termínu.
          Uveď:
          Název akce
          Datum/termín
          Čas (délka)
          Místo/forma
          Pořadatel (hypertextový odkaz)

          Výstup musí být pouze čisté HTML.
          """

          response = client.chat.completions.create(
              model="gpt-4o-mini",
              messages=[{"role": "user", "content": prompt}],
              temperature=0.2
          )

          html = response.choices[0].message.content

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com]"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Automatická aktualizace seznamu akcí"
          git push
